name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: shokzdownloader-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: shokzdownloader-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (macOS)
        if: runner.os == 'macOS'
        run: mv target/${{ matrix.target }}/release/ShokzDownloader ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: mv target/${{ matrix.target }}/release/ShokzDownloader.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Delete existing release
        run: gh release delete latest --cleanup-tag -y
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        continue-on-error: true

      - name: Create release
        run: |
          gh release create latest \
            shokzdownloader-macos/shokzdownloader-macos \
            shokzdownloader-windows.exe/shokzdownloader-windows.exe \
            --title "Latest Build" \
            --notes "Automated build from the latest commit on master." \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
